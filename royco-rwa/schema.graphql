# === TRANSACTION INDEX ===

type GlobalTransactionLog @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>
  chainId: BigInt! # Chain ID
  # Transaction fields (event.transaction)
  transactionHash: String! # Transaction Hash
  transactionIndex: BigInt! # Transaction Index in Block
  fromAddress: String! # From Address (sender)
  toAddress: String! # To Address (recipient)
  value: BigInt! # Value (native token transferred in wei)
  gasLimit: BigInt! # Gas Limit (gas provided by sender)
  gasPrice: BigInt! # Gas Price (in wei)
  nonce: BigInt! # Nonce (sender's transaction count)
  input: String! # Input Data (calldata, hex encoded)
  functionSelector: String # Function Selector as hex (e.g., "0xa9059cbb", nullable for plain ETH transfers)
  # Block fields (event.block)
  blockNumber: BigInt! # Block Number
  blockTimestamp: BigInt! # Block Timestamp
  blockHash: String! # Block Hash
  blockGasUsed: BigInt! # Block Gas Used
  blockGasLimit: BigInt! # Block Gas Limit
  blockSize: BigInt # Block Size (nullable)
  baseFeePerGas: BigInt! # EIP-1559 Base Fee Per Gas
  # Receipt fields (event.receipt — requires receipt: true in manifest)
  gasUsed: BigInt! # Gas Used (actual gas consumed by transaction)
  cumulativeGasUsed: BigInt! # Cumulative Gas Used in Block
  logsBloom: String! # Bloom Filter for Logs (hex encoded)
  # Computed fee fields (requires gasUsed from receipt)
  transactionFee: BigInt! # Transaction Fee in wei (gasUsed * gasPrice)
  priorityFee: BigInt! # Priority Fee in wei (gasUsed * (gasPrice - baseFeePerGas))
  burnedAmount: BigInt! # Burned Amount in wei (gasUsed * baseFeePerGas)
  # Metadata
  createdAt: BigInt! # Created At
}

