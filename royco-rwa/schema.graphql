  juniorVaultInitializationData: String! # Junior Vault Initialization Data
  kernelInitializationData: String! # Kernel Initialization Data
  accountantInitializationData: String! # Accountant Initialization Data
  ydmAddress: String! # YDM Address
  betaWAD: BigInt! # Beta WAD
  coverageWAD: BigInt! # Coverage WAD
  lltvWAD: BigInt # LLTV WAD (Removed in V2)
  dustTolerance: BigInt # Dust Tolerance (Removed in V2)
  seniorVaultDustTolerance: BigInt # Senior Vault Dust Tolerance (Added in V2)
  juniorVaultDustTolerance: BigInt # Junior Vault Dust Tolerance (Added in V2)
  fixedTermDurationSeconds: BigInt! # Fixed Term Duration Seconds
  yieldShareProtocolFeeWAD: BigInt # Yield Share Protocol Fee WAD (Added in V2)
  seniorVaultProtocolFeeWAD: BigInt! # Senior Vault Protocol Fee WAD
  juniorVaultProtocolFeeWAD: BigInt! # Junior Vault Protocol Fee WAD
  seniorSelfLiquidationBonusWAD: BigInt # Senior Self Liquidation Bonus WAD (Added in V2)
  protocolFeeRecipient: String! # Protocol Fee Recipient
  juniorTrancheRedemptionDelay: BigInt # Junior Tranche Redemption Delay (Removed in V2)
  blockNumber: BigInt! # Block Number of when market was created
  blockTimestamp: BigInt! # Block Timestamp of when market was created
