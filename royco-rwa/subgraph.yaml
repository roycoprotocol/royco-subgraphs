# prettier-ignore
specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Vault
    network: mainnet
    source:
      address: "0xDE3d20682597E1AF06341Dc41c8ABAB6FC8F57f6"
      abi: RoycoFactory
      startBlock: 24551968
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MarketDeployed
      abis:
        - name: RoycoFactory
          file: ./abis/RoycoFactoryV2.json
        - name: BaseVault
          file: ./abis/BaseVault.json
        - name: RoycoVaultTranche
          file: ./abis/RoycoVaultTrancheV2.json
        - name: RoycoAccountant
          file: ./abis/RoycoAccountantV2.json
        - name: RoycoKernel
          file: ./abis/RoycoKernelV2.json
      eventHandlers:
        - event: MarketDeployed((address,address,address,address),(string,string,string,string,address,address,address,address,bytes,bytes,bytes,bytes,bytes32,bytes32,bytes32,bytes32,(address,bytes4[],uint64[])[]))
          handler: handleMarketDeployed
          receipt: true
      file: ./src/royco-factory-v2.ts
templates:
  - kind: ethereum/contract
    name: RoycoVaultTranche
    network: mainnet
    source:
      abi: RoycoVaultTranche
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Transfer
        - Deposit
        - Redeem
        - ProtocolFeeSharesMinted
      abis:
        - name: BaseVault
          file: ./abis/BaseVault.json
        - name: RoycoVaultTranche
          file: ./abis/RoycoVaultTrancheV2.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
          receipt: true
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
          receipt: true
        - event: Redeem(indexed address,indexed address,(uint256,uint256,uint256),uint256)
          handler: handleRedeem
          receipt: true
        - event: ProtocolFeeSharesMinted(indexed address,uint256,uint256)
          handler: handleProtocolFeeSharesMinted
          receipt: true
      file: ./src/royco-vault-tranche-v2.ts
  - kind: ethereum/contract
    name: RoycoAccountant
    network: mainnet
    source:
      abi: RoycoAccountant
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BetaUpdated
        - CoverageUpdated
        - FixedTermDurationUpdated
        - JTImpermanentLossReset
        - JuniorTrancheDustToleranceUpdated
        - JuniorTrancheProtocolFeeUpdated
        - LLTVUpdated
        - SeniorTrancheDustToleranceUpdated
        - SeniorTrancheProtocolFeeUpdated
        - YDMUpdated
        - YieldShareProtocolFeeUpdated
      abis:
        - name: RoycoAccountant
          file: ./abis/RoycoAccountantV2.json
      eventHandlers:
        - event: BetaUpdated(uint96)
          handler: handleBetaUpdated
          receipt: true
        - event: CoverageUpdated(uint64)
          handler: handleCoverageUpdated
          receipt: true
        - event: FixedTermDurationUpdated(uint24)
          handler: handleFixedTermDurationUpdated
          receipt: true
        - event: JTImpermanentLossReset(uint256)
          handler: handleJTImpermanentLossReset
          receipt: true
        - event: JuniorTrancheDustToleranceUpdated(uint256)
          handler: handleJuniorTrancheDustToleranceUpdated
          receipt: true
        - event: JuniorTrancheProtocolFeeUpdated(uint64)
          handler: handleJuniorTrancheProtocolFeeUpdated
          receipt: true
        - event: LLTVUpdated(uint64)
          handler: handleLLTVUpdated
          receipt: true
        - event: SeniorTrancheDustToleranceUpdated(uint256)
          handler: handleSeniorTrancheDustToleranceUpdated
          receipt: true
        - event: SeniorTrancheProtocolFeeUpdated(uint64)
          handler: handleSeniorTrancheProtocolFeeUpdated
          receipt: true
        - event: YDMUpdated(address)
          handler: handleYDMUpdated
          receipt: true
        - event: YieldShareProtocolFeeUpdated(uint64)
          handler: handleYieldShareProtocolFeeUpdated
          receipt: true
      file: ./src/royco-accountant-v2.ts
  - kind: ethereum/contract
    name: RoycoKernel
    network: mainnet
    source:
      abi: RoycoKernel
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolFeeRecipientUpdated
        - SeniorTrancheSelfLiquidationBonusUpdated
      abis:
        - name: RoycoKernel
          file: ./abis/RoycoKernelV2.json
      eventHandlers:
        - event: ProtocolFeeRecipientUpdated(address)
          handler: handleProtocolFeeRecipientUpdated
          receipt: true
        - event: SeniorTrancheSelfLiquidationBonusUpdated(uint64)
          handler: handleSeniorTrancheSelfLiquidationBonusUpdated
          receipt: true
      file: ./src/royco-kernel-v2.ts
