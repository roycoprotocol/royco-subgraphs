# prettier-ignore
# Hand-maintained. One source+sink pair per schema entity; table names are the
# entity name in snake_case. Add a pair here when you add an entity to
# schema.graphql, or it silently never reaches Neon. The pipelineName and the
# per-network metadata loop below are filled by prepare:entrypoint:<network>.
apiVersion: 3
name: royco-day-entrypoint-pipeline
resource_size: s
sources:
  royco_day_entrypoint_day_entry_point_state_reference:
    name: day_entry_point_state
    subgraphs:
      - name: royco-day-entrypoint-mainnet
        version: 1.0.0
    type: subgraph_entity
  royco_day_entrypoint_day_entry_point_request_reference:
    name: day_entry_point_request
    subgraphs:
      - name: royco-day-entrypoint-mainnet
        version: 1.0.0
    type: subgraph_entity
  royco_day_entrypoint_day_entry_point_execution_reference:
    name: day_entry_point_execution
    subgraphs:
      - name: royco-day-entrypoint-mainnet
        version: 1.0.0
    type: subgraph_entity
transforms: {}
sinks:
  royco_day_entrypoint_day_entry_point_state_postgres:
    type: postgres
    table: day_entry_point_state
    schema: public
    secret_name: NEON_ROYCO_ESTATE
    description: "Postgres sink for: day_entry_point_state"
    from: royco_day_entrypoint_day_entry_point_state_reference
  royco_day_entrypoint_day_entry_point_request_postgres:
    type: postgres
    table: day_entry_point_request
    schema: public
    secret_name: NEON_ROYCO_ESTATE
    description: "Postgres sink for: day_entry_point_request"
    from: royco_day_entrypoint_day_entry_point_request_reference
  royco_day_entrypoint_day_entry_point_execution_postgres:
    type: postgres
    table: day_entry_point_execution
    schema: public
    secret_name: NEON_ROYCO_ESTATE
    description: "Postgres sink for: day_entry_point_execution"
    from: royco_day_entrypoint_day_entry_point_execution_reference
