}

# <- ABI: RoycoSeniorTranche.LiquidityPremiumSharesMinted(indexed address holder, uint256 mintedLiquidityPremiumShares, uint256 totalTrancheShares)
#
# !! event.address is the SENIOR TRANCHE, not the kernel. Resolve marketId via
#    SeniorTranche.KERNEL(), or cheaper: load this tranche's own DayVaultState and
#    read its marketId, avoiding an eth_call per event.
#    The market-keyed id is SAFE: exactly one senior tranche per market.
type DayLiquidityPremiumSharesMintedHistory @entity(immutable: true) {
