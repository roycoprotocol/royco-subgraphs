# =============================================================================
# royco-day schema
#
# Ported from day-draft/day.schema.graphql. Field names are preserved from the
# draft; where a name differs from the ABI member it is read from, the field
# carries a "<- ABI:" annotation so handler authors never have to guess. The
# full mapping table lives in CLAUDE.md §7.
#
# Entity + field names become Postgres table + column names (snake_case) via the
# Goldsky pipeline. A rename here is a column migration in Neon. See CLAUDE.md §9.
# =============================================================================

# === GLOBAL ===
#
# !! FROZEN CROSS-PACKAGE CONTRACT — DO NOT CHANGE THESE TWO ENTITIES !!
#
# GlobalTokenTransfer and GlobalTokenActivity are byte-identical to the same
# entities in royco-rwa/schema.graphql. That is deliberate: royco-rwa (5
# pipelines), royco-usd, and staked-royco-usd ALL sink these entities into the
# SAME shared Neon tables — public.global_token_transfer and
# public.global_token_activity, secret NEON_ROYCO_ESTATE. royco-day joins that
# union.
#
# Rows do not collide (ids are chain + tx + log scoped), but the column set is
# now a contract shared with those packages. Adding, removing, or renaming a
# field here breaks their pipelines, not just ours. Before touching either
# entity, diff against royco-rwa/schema.graphql and coordinate the change across
# every package listed above.

type GlobalTokenTransfer @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>_<TOKEN_INDEX>
  # ^ The trailing TOKEN_INDEX is NOT decoration: one Redeem log pays out up to
  #   three different asset ERC20s (the AssetClaims quintuple), and this entity is
  #   immutable — a second row on the same id is fatal at index time. Single-token
  #   logs use TOKEN_INDEX_SINGLE (0). This entity has no tokenIndex COLUMN (the
  #   field set is frozen, see the banner above); GlobalTokenActivity does, and is
  #   where you query the leg. See generateGlobalTokenTransferId for the
  #   cross-package caveat — royco-rwa writes a different shape into this same
  #   column, so never parse this id positionally.
  vaultId: String! # Vault ID
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  category: String! # Category ("shares", "assets")
  subCategory: String! # Sub Category ("mint", "burn", "transferIn", "transferOut", "deposit", "withdraw")
  tokenId: String! # Token ID
  tokenAddress: String! # Token Address
  fromAddress: String! # From Address
  toAddress: String! # To Address
  value: BigInt! # Value
  blockNumber: BigInt! # Block Number
  blockTimestamp: BigInt! # Block Timestamp
  transactionHash: String! # Transaction Hash
  logIndex: BigInt! # Log Index
  createdAt: BigInt! # Created At
}

type GlobalTokenActivity @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>_<VAULT_ADDRESS>_<CATEGORY>_<SUB_CATEGORY>_<TOKEN_INDEX>
  vaultId: String! # Vault ID
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  category: String! # Category ("shares", "assets")
  subCategory: String! # Sub Category ("mint", "burn", "transferIn", "transferOut", "deposit", "withdraw")
  accountAddress: String! # Account Address
  type: String! # Type ("transfer")
  tokenIndex: BigInt! # Token Index
  tokenId: String! # Token ID
  tokenAddress: String! # Token Address
  value: BigInt! # Value
  status: String! # Status ("completed")
  blockNumber: BigInt! # Block Number
  blockTimestamp: BigInt! # Block Timestamp
  transactionHash: String! # Transaction hash
  logIndex: BigInt! # Log Index
  createdAt: BigInt! # Created At
}

# xxx GLOBAL xxx

# === MARKETS ===

type DayMarketState @entity(immutable: false) {
  # ======
  # => data from "event MarketDeploymentCompleted" in "RoycoFactory" (abis/RoycoFactory.json)
  #    Signature (all 8 tuple components, in order):
  #    MarketDeploymentCompleted(indexed address,indexed address,(address,address,address,address,address,address,address,bytes))
  id: String! # <CHAIN_ID>_<MARKET_ID> where "marketId" is "kernelAddress"
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID (is "kernelAddress")
  templateAddress: String! # Template Address
  deployerAddress: String! # Deployer Address
  seniorTrancheAddress: String! # Senior Tranche Address
  juniorTrancheAddress: String! # Junior Tranche Address
  liquidityTrancheAddress: String! # Liquidity Tranche Address
  seniorTrancheId: String! # Senior Tranche ID: <CHAIN_ID>_<SENIOR_TRANCHE_ADDRESS>
  juniorTrancheId: String! # Junior Tranche ID: <CHAIN_ID>_<JUNIOR_TRANCHE_ADDRESS>
  liquidityTrancheId: String! # Liquidity Tranche ID: <CHAIN_ID>_<LIQUIDITY_TRANCHE_ADDRESS>
  kernelAddress: String! # Kernel Address
  accountantAddress: String! # Accountant Address
  juniorTrancheYdmAddress: String! # Junior Tranche YDM Address <- ABI: result.ydm (NOT result.ltYdm)
  liquidityTrancheYdmAddress: String! # Liquidity Tranche YDM Address <- ABI: result.ltYdm
  creationEncodedData: String! # Creation Encoded Data (bytes of "extras" in event, stored as hex string)
  # ======
  # ======
  # => data from "RoycoDayAccountant.getState()" (27-member struct)
  seniorTrancheProtocolFeeWAD: BigInt! # Senior Tranche Protocol Fee WAD <- ABI: stProtocolFeeWAD
  juniorTrancheProtocolFeeWAD: BigInt! # Junior Tranche Protocol Fee WAD <- ABI: jtProtocolFeeWAD
  juniorTrancheYieldShareProtocolFeeWAD: BigInt! # Junior Tranche Yield Share Protocol Fee WAD <- ABI: jtYieldShareProtocolFeeWAD
  liquidityTrancheYieldShareProtocolFeeWAD: BigInt! # Liquidity Tranche Yield Share Protocol Fee WAD <- ABI: ltYieldShareProtocolFeeWAD
  minCoverageWAD: BigInt! # Min Coverage WAD <- ABI: minCoverageWAD
  minLiquidityWAD: BigInt! # Min Liquidity WAD <- ABI: minLiquidityWAD
  marketState: String! # Market State (Enum: "perpetual" -> 0 in Contract.MarketState, "fixed" -> 1 in Contract.MarketState)
  # ^ The enum order is PERPETUAL, FIXED_TERM — see contracts/libraries/Types.sol:25-28.
  #   0 is PERPETUAL, not "fixed". Do not "correct" this back; it reads backwards.
  # ^ <- ABI: lastMarketState (uint8 -> i32). NOTE: this is the LAST SYNCED state.
  #   The LIVE state is previewSyncTrancheAccounting().state.marketState. They
  #   disagree between syncs — this field is deliberately the stored one.
  fixedTermDurationSeconds: BigInt! # Fixed Term Duration Seconds <- ABI: fixedTermDurationSeconds (uint24 -> i32! needs BigInt.fromI32)
  fixedTermEndTimestamp: BigInt! # Fixed Term End Timestamp <- ABI: fixedTermEndTimestamp (uint32 -> BigInt, direct)
  lastYieldShareAccruedTimestamp: BigInt! # Last Yield Share Accrued Timestamp <- ABI: lastYieldShareAccrualTimestamp
  lastPremiumPaymentTimestamp: BigInt! # Last Premium Payment Timestamp <- ABI: lastPremiumPaymentTimestamp
  timeWeightedJuniorTrancheYieldShareAccruedWAD: BigInt! # Time Weighted Junior Tranche Yield Share Accrued WAD <- ABI: twJTYieldShareAccruedWAD
  maxJuniorTrancheYieldShareAccruedWAD: BigInt! # Max Junior Tranche Yield Share WAD <- ABI: maxJTYieldShareWAD
  # ^ NOTE: this is a CONFIGURED CAP (set via setMaxYieldShares / MaxYieldSharesUpdated),
  #   NOT an accrual — despite the "Accrued" in the field name. The real accrual is
  #   timeWeightedJuniorTrancheYieldShareAccruedWAD directly above. Do not average them.
  timeWeightedLiquidityTrancheYieldShareAccruedWAD: BigInt! # Time Weighted Liquidity Tranche Yield Share Accrued WAD <- ABI: twLTYieldShareAccruedWAD
  maxLiquidityTrancheYieldShareAccruedWAD: BigInt! # Max Liquidity Tranche Yield Share WAD <- ABI: maxLTYieldShareWAD (also a CAP, see above)
  coverageLiquidationUtilizationWAD: BigInt! # Coverage Liquidation Utilization WAD <- ABI: coverageLiquidationUtilizationWAD
  seniorTrancheDustTolerance: BigInt! # Senior Tranche Dust Tolerance <- ABI: stNAVDustTolerance
  juniorTrancheDustTolerance: BigInt! # Junior Tranche Dust Tolerance <- ABI: jtNAVDustTolerance
  effectiveNAVDustTolerance: BigInt! # Effective NAV Dust Tolerance <- ABI: effectiveNAVDustTolerance
  # ======
  # ======
  # => data from "RoycoDayKernel.getState()" (7-member struct)
  protocolFeeRecipientAddress: String! # Protocol Fee Recipient Address <- ABI: protocolFeeRecipient
  seniorTrancheSelfLiquidationBonusWAD: BigInt! # Senior Tranche Self Liquidation Bonus WAD <- ABI: stSelfLiquidationBonusWAD
  seniorTrancheOwnedYieldBearingAssets: BigInt! # Senior Tranche Owned Yield Bearing Assets in asset token units <- ABI: stOwnedYieldBearingAssets
  juniorTrancheOwnedYieldBearingAssets: BigInt! # Junior Tranche Owned Yield Bearing Assets in asset token units <- ABI: jtOwnedYieldBearingAssets
  liquidityTrancheOwnedYieldBearingAssets: BigInt! # Liquidity Tranche Owned Yield Bearing Assets in asset token units <- ABI: ltOwnedYieldBearingAssets
  liquidityTrancheOwnedSeniorTrancheShares: BigInt! # Liquidity Tranche Owned Senior Tranche Shares <- ABI: ltOwnedSeniorTrancheShares
  # NOTE: Kernel.getState() also returns `roycoBlacklist` (address), which this
  # schema deliberately does not capture. RoycoBlacklistUpdated(address) is
  # likewise unindexed. Add both together if it is ever needed.
  # ======
  # ======
  # => data from "RoycoDayKernel.previewSyncTrancheAccounting(_trancheType)"
  #
  #    !! Use the KERNEL overload, not the Accountant's !!
  #    Kernel:     previewSyncTrancheAccounting(uint8 _trancheType)
  #                  -> (TrancheState state, Claims claims, uint256 totalTrancheShares)   [view]
  #    Accountant: previewSyncTrancheAccounting(uint256 _stRawNAV, uint256 _jtRawNAV)
  #                  -> (TrancheState state)                                              [view]
  #    The Accountant overload requires you to supply the very NAVs you are
  #    trying to read — circular. The Kernel derives them itself, and only the
  #    Kernel returns `claims` (which DayVaultState's five asset fields need).
  #
  #    The fields below all come from `state`, which is TRANCHE-INDEPENDENT — so
  #    any _trancheType works for this market-level entity. DayVaultState, which
  #    consumes `claims`, must pass that tranche's own TRANCHE_TYPE() instead.
  seniorTrancheRawNAV: BigInt! # Senior Tranche Raw NAV <- ABI: state.stRawNAV
  juniorTrancheRawNAV: BigInt! # Junior Tranche Raw NAV <- ABI: state.jtRawNAV
  liquidityTrancheRawNAV: BigInt! # Liquidity Tranche Raw NAV <- ABI: state.ltRawNAV
  seniorTrancheEffectiveNAV: BigInt! # Senior Tranche Effective NAV <- ABI: state.stEffectiveNAV
  juniorTrancheEffectiveNAV: BigInt! # Junior Tranche Effective NAV <- ABI: state.jtEffectiveNAV
  juniorTrancheCoverageImpermanentLoss: BigInt! # Junior Tranche Coverage Impermanent Loss <- ABI: state.jtCoverageImpermanentLoss
  liquidityTrancheLiquidityPremium: BigInt! # Liquidity Tranche Liquidity Premium <- ABI: state.ltLiquidityPremium
  coverageUtilizationWAD: BigInt! # Coverage Utilization WAD <- ABI: state.coverageUtilizationWAD
  liquidityUtilizationWAD: BigInt! # Liquidity Utilization WAD <- ABI: state.liquidityUtilizationWAD
  isJuniorTrancheCoinvested: Boolean! # Is Junior Tranche Coinvested <- ABI: state.jtCoinvested
  # ======
  # ======
  # => records
  #
  # Cursors for the six DayFixedTermHistory / Day*History streams in "=== RECORDS ===".
  # These are COUNTS, not last-indices — a different cursor shape from
  # `lastHistoricalEntryIndex`, deliberately. See "ENTRY INDEX CURSOR" below.
  #
  # Write protocol (use-then-increment):
  #   const idx = market.countXEntries;   // this IS the next entryIndex
  #   ... build the id from idx, set entity.entryIndex = idx ...
  #   market.countXEntries = idx.plus(BigInt.fromI32(1));
  #
  # So the first record is entryIndex 0 and the count becomes 1. Total == count.
  # The last record sits at (count - 1), readable ONLY when count > 0.
  # Seed all six to BigInt.zero() in the MarketDeploymentCompleted handler's
  # `if (!entity)` branch — a non-null field left unset is fatal at index time (§8).
  countFixedTermEntries: BigInt! # Count of Fixed Term Entries -> DayFixedTermHistory
  # ^ Advances ONLY on FixedTermCommenced. DayFixedTermHistory is the one MUTABLE
  #   record stream: the close-out writes patch the row at (count - 1) and must NOT
  #   increment this.
  countJuniorTrancheYieldSharesAccruedEntries: BigInt! # Count of Junior Tranche Yield Shares Accrued Entries -> DayJuniorTrancheYieldSharesAccruedHistory
  countLiquidityTrancheYieldSharesAccruedEntries: BigInt! # Count of Liquidity Tranche Yield Shares Accrued Entries -> DayLiquidityTrancheYieldSharesAccruedHistory
  countLiquidityPremiumSharesMintedEntries: BigInt! # Count of Liquidity Premium Shares Minted Entries -> DayLiquidityPremiumSharesMintedHistory
  countLiquidityPremiumReinvestedEntries: BigInt! # Count of Liquidity Premium Reinvested Entries -> DayLiquidityPremiumReinvestedHistory
  countLiquidityPremiumReinvestmentFailedEntries: BigInt! # Count of Liquidity Premium Reinvestment Failed Entries -> DayLiquidityPremiumReinvestmentFailedHistory
  #
  # A LIFETIME ACCUMULATOR, not a cursor and not a mirror of any on-chain value.
  # Every JuniorTrancheCoverageImpermanentLossReset adds its erased amount here, so
  # this only ever grows: it answers "how much JT coverage loss has this market
  # written off in total?", which no contract tracks and no getState() member holds.
  #
  # !! DO NOT CONFUSE WITH `juniorTrancheCoverageImpermanentLoss` ABOVE. They sit in
  #    one row, differ by one word, and mean opposite things:
  #      juniorTrancheCoverageImpermanentLoss  = the LIVE, point-in-time loss, from
  #                                              the preview block. Goes UP and DOWN,
  #                                              and is reset to 0 on every erase.
  #      juniorTrancheCoverageLossNAV          = the LIFETIME TOTAL of everything
  #                                              erased. MONOTONIC; never decreases.
  #    In Neon: junior_tranche_coverage_impermanent_loss vs
  #    junior_tranche_coverage_loss_nav. Summing or comparing the two is meaningless.
  #
  # Counts EVERY erase, not just term ends — unlike
  # DayFixedTermHistory.juniorTrancheCoverageImpermanentLossNAV, which is per-term
  # and only records the erase that ENDED that term. The erase branch fires on
  # already-perpetual markets too (coverage past the liquidation threshold, JT wiped
  # out), so this total is >= the sum of the per-term rows, by design.
  #
  # NAV_UNIT, like every other *NAV field here. Seeded to zero at market creation:
  # nothing has been erased yet, and there is no contract value to read.
  juniorTrancheCoverageLossNAV: BigInt! # Junior Tranche Coverage Loss NAV (cumulative, monotonic)
  # ======
  # ======
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
}

# xxx MARKETS xxx

# === TRANCHES ===

type DayVaultState @entity(immutable: false) {
  id: String! # <CHAIN_ID>_<VAULT_ADDRESS>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  majorType: String! # Major Type ("day")
  minorType: String! # Minor Type ("senior", "junior", "liquidity")
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  assetTokenId: String! # Asset Token ID
  assetTokenAddress: String! # Asset Token Address
  assetTokenDecimals: Int! # Asset Token Decimals (ERC20.decimals() -> uint8 -> i32; Int! IS i32, assign direct)
  shareTokenId: String! # Share Token ID
  shareTokenAddress: String! # Share Token Address
  shareTokenDecimals: Int! # Share Token Decimals (tranche.decimals() -> uint8 -> i32)
  sharesTotalSupply: BigInt! # Shares Total Supply
  # The next 5 fields are the AssetClaims struct from convertToAssets(sharesTotalSupply)
  # — the pro-rata breakdown of what those shares represent underneath.
  # AssetClaims = (stAssets, jtAssets, ltAssets, stShares, nav). See CLAUDE.md §6.
  #
  # The `claims` prefix is not decoration. Without it `seniorTrancheShares` sits
  # beside `sharesTotalSupply` looking like a sibling of it, when the two are
  # unrelated: one is this vault's own share supply, the other is senior-tranche
  # shares held INSIDE the claim. The prefix also groups the five as one derived
  # struct, which is why a junior vault legitimately reports senior assets.
  #
  # NOT redemption proceeds — previewRedeem is a different call down a different
  # kernel path (stPreviewRedeem/jt/lt). convertToAssets is the accounting claim.
  #
  # !! LIQUIDITY TRANCHE ASYMMETRY (RoycoVaultTranche.convertToAssets):
  #    on the LT — and ONLY the LT — the tranche rewrites the struct before
  #    scaling: claimsSeniorTrancheShares is forced to 0 and claimsNAV is taken
  #    from state.ltRawNAV. Idle (un-reinvested) ST shares are excluded so LT's
  #    share price cannot tick down on reinvestment slippage. So a zero
  #    claimsSeniorTrancheShares on an LT row is CORRECT, not missing data.
  #    claimsNAV stays NAV_UNIT and keeps its meaning — the total NAV of the
  #    claim — on every tranche; the LT claim simply contains no ST shares, so
  #    its NAV is ltRawNAV. Same unit, same definition, narrower claim.
  #    All three tranches declare byte-identical convertToAssets signatures, so
  #    this is invisible from the ABI. Only contracts/ shows it (§4).
  claimsSeniorTrancheAssets: BigInt! # Claims Senior Tranche Assets <- ABI: claims.stAssets
  claimsJuniorTrancheAssets: BigInt! # Claims Junior Tranche Assets <- ABI: claims.jtAssets
  claimsLiquidityTrancheAssets: BigInt! # Claims Liquidity Tranche Assets <- ABI: claims.ltAssets
  claimsSeniorTrancheShares: BigInt! # Claims Senior Tranche Shares <- ABI: claims.stShares (ALWAYS 0 on the liquidity tranche — see above)
  claimsNAV: BigInt! # Claims NAV <- ABI: claims.nav
  # The NAV value of ONE whole asset token.
  # There is NO bare `convertTrancheUnitsToNAVUnits` anywhere — the tranches expose
  # only convertToAssets -> Claims and convertToShares -> uint256, neither of which
  # converts to NAV units. It lives ONLY on RoycoDayKernel, as three tranche-prefixed
  # `view` variants. Reach the Kernel via tranche.KERNEL() (raw is fine, §5 — immutable
  # metadata). AS has no closures (§3) and these are three distinct generated methods,
  # so dispatch is an explicit if/else on THIS vault's minorType:
  #   "senior"    -> kernel.try_stConvertTrancheUnitsToNAVUnits(oneAssetToken)
  #   "junior"    -> kernel.try_jtConvertTrancheUnitsToNAVUnits(oneAssetToken)
  #   "liquidity" -> kernel.try_ltConvertTrancheUnitsToNAVUnits(oneAssetToken)
  # with oneAssetToken = BigInt.fromI32(10).pow(u8(assetTokenDecimals)) (.pow takes u8).
  # Dispatch on minorType, NOT on TRANCHE_TYPE() == 0/1/2 — the ABI carries the enum
  # type name but no member names, so that numbering is an inference (§6).
  # Unlike DayMarketState's `state` fields (tranche-independent, any type works), the
  # prefix here is fixed by this vault's own tranche.
  # try_ is MANDATORY — state-dependent, reverts in edge states (§5); `view` is not
  # revert-safety. On reverted, leave the previous value — do NOT write zero. At
  # creation there is no previous value, so seed it in the `if (!entity)` branch (§8).
  assetPriceNAV: BigInt! # Asset Price NAV <- ABI: Kernel.st/jt/ltConvertTrancheUnitsToNAVUnits(10 ** assetTokenDecimals)
  # The next 5 are the SAME AssetClaims struct, from convertToAssets(10 ** shareTokenDecimals)
  # — i.e. one whole share's claim. They carry no `claims` prefix only because
  # `sharePrice` already says what they are; they are claims too, and the LT
  # asymmetry above applies to them identically (sharePriceSeniorTrancheShares is
  # likewise always 0 on the liquidity tranche).
  sharePriceSeniorTrancheAssets: BigInt! # Share Price Senior Tranche Assets <- ABI: claims.stAssets
  sharePriceJuniorTrancheAssets: BigInt! # Share Price Junior Tranche Assets <- ABI: claims.jtAssets
  sharePriceLiquidityTrancheAssets: BigInt! # Share Price Liquidity Tranche Assets <- ABI: claims.ltAssets
  sharePriceSeniorTrancheShares: BigInt! # Share Price Senior Tranche Shares <- ABI: claims.stShares
  sharePriceNAV: BigInt! # Share Price NAV <- ABI: claims.nav
  lastHistoricalEntryIndex: BigInt! # Cursor for DayVaultStateHistorical. See "ENTRY INDEX CURSOR" below.
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
}

# =============================================================================
# ENTRY INDEX CURSOR — read this before writing any *Historical entity.
#
# Every immutable *Historical entity is keyed by a dense, per-parent counter
# owned by its mutable *State parent as `lastHistoricalEntryIndex`.
#
#   - The creation snapshot is entry 0, and sets lastHistoricalEntryIndex = 0.
#   - Each later snapshot writes lastHistoricalEntryIndex + 1, then stores it.
#   - Total snapshots for a parent == lastHistoricalEntryIndex + 1.
#
# WHY, and why not the alternatives:
#   - An @entity(immutable: true) is WRITE-ONCE. A second save() on the same id
#     is a fatal "entity already exists" at INDEX time — it passes `graph build`
#     and dies in production. So every historical id needs a per-write
#     discriminator.
#   - Do NOT use <BLOCK_TIMESTAMP> (royco-rwa's PositionStateHistorical does):
#     two snapshots in one block collide. Same bug, just rarer.
#   - Do NOT use <TX_HASH>_<LOG_INDEX>: unique, but gives no O(1) cursor, forces
#     a sort for "latest N", and can't express snapshots not tied to a log.
#
# TWO CURSOR SHAPES COEXIST, DELIBERATELY — do not harmonise them:
#   - The *State parents (DayVaultState, DayPositionState, DayFeeState) are born
#     together with their entry 0, so `lastHistoricalEntryIndex` is a LAST-INDEX:
#     total == field + 1, increment-then-write.
#   - DayMarketState's six record streams (`# => records`) are born EMPTY — a market
#     legitimately has zero fixed terms forever — so a non-null last-index has no
#     truthful initial value (0 would falsely assert one entry exists). Hence
#     `count*Entries` is a COUNT: total == field, last == field - 1 (only when
#     field > 0), write-then-increment.
# Both are 0-based and dense; only the base value and the increment ORDER differ.
# Not 1-based — that would put two index bases in one schema and break the shared
# reading of `entryIndex` across tables.
# =============================================================================

type DayVaultStateHistorical @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<VAULT_ADDRESS>_<ENTRY_INDEX>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  vaultId: String! # Vault ID
  entryIndex: BigInt! # Entry Index
  majorType: String! # Major Type ("day")
  minorType: String! # Minor Type ("senior", "junior", "liquidity")
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  sharesTotalSupply: BigInt! # Shares Total Supply
  # The AssetClaims quintuple — see the full note on DayVaultState above,
  # including the liquidity-tranche asymmetry (claimsSeniorTrancheShares is
  # always 0 there).
  claimsSeniorTrancheAssets: BigInt! # Claims Senior Tranche Assets
  claimsJuniorTrancheAssets: BigInt! # Claims Junior Tranche Assets
  claimsLiquidityTrancheAssets: BigInt! # Claims Liquidity Tranche Assets
  claimsSeniorTrancheShares: BigInt! # Claims Senior Tranche Shares
  claimsNAV: BigInt! # Claims NAV
  assetPriceNAV: BigInt! # Asset Price NAV (copy the parent DayVaultState's value —
  # this entity has no assetTokenDecimals and must not re-call the Kernel)
  sharePriceSeniorTrancheAssets: BigInt! # Share Price Senior Tranche Assets
  sharePriceJuniorTrancheAssets: BigInt! # Share Price Junior Tranche Assets
  sharePriceLiquidityTrancheAssets: BigInt! # Share Price Liquidity Tranche Assets
  sharePriceSeniorTrancheShares: BigInt! # Share Price Senior Tranche Shares
  sharePriceNAV: BigInt! # Share Price NAV
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

# xxx TRANCHES xxx

# === RECORDS ===
#
# Six event-driven, market-keyed streams. Unlike the *Historical snapshots above,
# these are cursored by DayMarketState's `count*Entries` fields, NOT by
# `lastHistoricalEntryIndex` — see "ENTRY INDEX CURSOR" above for why the two
# shapes differ and how each is written.

# THE ONE MUTABLE RECORD STREAM. Three separate events write one row, so
# immutable: true would be a fatal "entity already exists" at index time (§8):
#   1. FixedTermCommenced(uint32)                     -> creates the row
#   2. FixedTermEnded()                               -> sets endBlockTimestamp
#   3. JuniorTrancheCoverageImpermanentLossReset(uint256)
#        -> patches juniorTrancheCoverageImpermanentLossNAV. Same tx as (2),
#           later log index — handlers fire in log order, so (2) cannot see it.
#
# !! FixedTermEnded() has an EMPTY payload — it carries no term identifier. The
#    only way to resolve WHICH term ended is to load the open row at
#    (countFixedTermEntries - 1), guarded on countFixedTermEntries > 0. Never
#    derive an entry index from block number or timestamp (§8).
#
# !! Events (1) and (2) are on RoycoDayAccountant, whose address is NOT the
#    marketId (§6). Resolve accountant -> kernel via ACCOUNTANT.KERNEL() first.
#
# !! CLOSING A TERM IS A UNION OF TWO EVENTS, NOT ONE. setFixedTermDuration(0)
#    force-writes lastMarketState = PERPETUAL and deletes fixedTermEndTimestamp,
#    but emits NO FixedTermEnded — `withSyncedAccounting` syncs BEFORE the body,
#    while the old non-zero duration still holds, so the pre-body sync need not
#    transition either. Closing on FixedTermEnded alone silently leaves
#    endBlockTimestamp == 0 forever on a provably-perpetual market. So ALSO close
#    on FixedTermDurationUpdated(uint24) when fixedTermDurationSeconds == 0.
#    Both can fire in ONE tx (natural expiry + a duration write), so guard every
#    close on `endBlockTimestamp == 0` before writing. initialize() also emits
#    FixedTermDurationUpdated, so no-op on a null lookup rather than creating.
type DayFixedTermHistory @entity(immutable: false) {
  id: String! # <CHAIN_ID>_<MARKET_ID>_<ENTRY_INDEX>
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  entryIndex: BigInt! # Entry Index (cursor: DayMarketState.countFixedTermEntries)
  startBlockTimestamp: BigInt! # Start Block Timestamp (event.block.timestamp of FixedTermCommenced)
  scheduledEndBlockTimestamp: BigInt! # Scheduled End Block Timestamp <- ABI: FixedTermCommenced.fixedTermEndTimestamp (uint32 -> BigInt, direct — NOT uint24, no BigInt.fromI32)
  # ^ The CONTRACT-SCHEDULED end, distinct in kind from endBlockTimestamp below (the
  #   ACTUAL end). DayMarketState.fixedTermEndTimestamp holds the same number but is
  #   LIVE state — it is deleted on term end and overwritten by each new term, so
  #   scheduled-vs-actual for a CONCLUDED term is unanswerable without this per-term
  #   copy. Do not substitute one for the other.
  endBlockTimestamp: BigInt! # End Block Timestamp (ACTUAL end; if not ended, it's 0)
  juniorTrancheCoverageImpermanentLossNAV: BigInt! # Junior Coverage Impermanent Loss NAV (0 if not ended, or no loss) <- ABI: JuniorTrancheCoverageImpermanentLossReset.jtCoverageImpermanentLossErased
  # ^ NOT previewSyncTrancheAccounting().state.jtCoverageImpermanentLoss and NOT
  #   getState().lastJTCoverageImpermanentLoss — BOTH are provably ZERO by the instant
  #   FixedTermEnded fires: the Accountant erases into a local and zeroes storage
  #   BEFORE marshalling state. The pre-erase value survives ONLY in the Reset event.
  #
  # !! HANDLER GUARD — a blind patch CORRUPTS rows, and so does the obvious guard.
  #    An erase does NOT imply a term ended: the erase branch has four disjuncts and
  #    only one is "the fixed term elapsed"; the rest (duration permanently 0,
  #    coverage past the liquidation threshold, JT wiped out) fire on markets that
  #    are ALREADY perpetual. The two emit sites also differ — the sync site is
  #    guarded by `!= ZERO_NAV_UNITS`, the setFixedTermDuration(0) site is NOT.
  #    Three shapes reach the handler:
  #      A) sync path, term ended  -> FixedTermEnded fired at a LOWER log index, so
  #                                   the row is CLOSED, IN THIS TX.        -> patch
  #      B) setFixedTermDuration(0) on a LIVE term -> the body emits the Reset with
  #                                   a real loss BEFORE its own
  #                                   FixedTermDurationUpdated(0), so the row is
  #                                   still OPEN.                           -> patch
  #      C) incidental erase, market already perpetual -> the last row closed in an
  #                                   EARLIER tx.                           -> skip
  #    So: patch iff the row is OPEN or was CLOSED IN THIS TX.
  #      if (erased.isZero()) return;                       // unguarded config site
  #      if (!entry.endBlockTimestamp.isZero() &&
  #          entry.updatedAtTransactionHash != thisTx) return;
  #    Case B is why "the row must be closed" is WRONG — it silently drops the loss
  #    on every mid-term setFixedTermDuration(0). See recordFixedTermCoverageLoss.
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
  # ^ createdAt* set exactly once in the `if (!entity)` branch — never re-stamp it on
  #   the close-out patches (§8).
}

# <- ABI: RoycoDayAccountant.JuniorTrancheYieldShareAccrued(uint256 jtYieldShareWAD, uint256 twJTYieldShareAccruedWAD)
# The accountant address is NOT the marketId — resolve via ACCOUNTANT.KERNEL() (§6).
type DayJuniorTrancheYieldSharesAccruedHistory @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<MARKET_ID>_<ENTRY_INDEX>
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  entryIndex: BigInt! # Entry Index (cursor: DayMarketState.countJuniorTrancheYieldSharesAccruedEntries)
  yieldShareWAD: BigInt! # Yield Share WAD <- ABI: jtYieldShareWAD
  timeWeightedYieldShareAccruedWAD: BigInt! # Time Weighted Junior Tranche Yield Share Accrued WAD <- ABI: twJTYieldShareAccruedWAD
  # ^ NOT monotonic. This is the accumulator AFTER the increment, and it is zeroed
  #   whenever premiums are paid out of ST yield. The series is a SAWTOOTH that resets
  #   per premium payment, NOT a lifetime cumulative — a negative delta between
  #   consecutive entryIndex rows IS the reset marker, not a data error. It accrues
  #   only since the last premium payment; DayMarketState.lastPremiumPaymentTimestamp
  #   holds that boundary for CURRENT state but is deliberately not snapshotted here.
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

