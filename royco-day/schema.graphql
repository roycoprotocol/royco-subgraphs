# === FEES ===
#
# majorType/minorType are part of the id because a single (vault, account) pair
# can accrue fees from MORE THAN ONE source. RoycoSeniorTranche emits both
# ProtocolFeeSharesMinted(protocolFeeRecipient, ...) and
# LiquidityPremiumSharesMinted(holder, ...) — if the protocol fee recipient is
# also an LP holder, the two would collide into one row without the type
# discriminators. royco-rwa's generateFeeStateId does the same for this reason.

type DayFeeState @entity(immutable: false) {
  id: String! # <CHAIN_ID>_<VAULT_ADDRESS>_<ACCOUNT_ADDRESS>_<MAJOR_TYPE>_<MINOR_TYPE>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  vaultId: String! # Vault ID
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  accountAddress: String! # Account Address
  majorType: String! # Major Type ("protocol", "liquidityPremium")
  minorType: String! # Minor Type ("shares", "assets")
  shares: BigInt! # Shares (total minted shares so far + newly minted shares)
  nav: BigInt! # NAV (running total of convertToAssets(newly minted shares).nav)
  lastHistoricalEntryIndex: BigInt! # Cursor for DayFeeStateHistorical. See "ENTRY INDEX CURSOR" above.
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
}

type DayFeeStateHistorical @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<VAULT_ADDRESS>_<ACCOUNT_ADDRESS>_<MAJOR_TYPE>_<MINOR_TYPE>_<ENTRY_INDEX>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  vaultId: String! # Vault ID
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  accountAddress: String! # Account Address
  majorType: String! # Major Type ("protocol", "liquidityPremium")
  minorType: String! # Minor Type ("shares", "assets")
  entryIndex: BigInt! # Entry Index
  shares: BigInt! # Shares (total minted shares so far + newly minted shares)
  nav: BigInt! # NAV (running total of convertToAssets(newly minted shares).nav)
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

