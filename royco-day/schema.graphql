# === FEES ===
#
# THE PROTOCOL FEE IS THE ONLY FEE, and it is always minted as shares. The id is
# MARKET-scoped: <CHAIN>_<MARKET_ID>_<ACCOUNT>_<MAJOR>_<MINOR>, so a market's three
# tranche-fee streams sort adjacently. That makes majorType/minorType mean:
#   majorType = "day"                              — the product (== VAULT_MAJOR_TYPE); constant
#   minorType = "senior" / "junior" / "liquidity"  — the tranche (== vault.minorType)
# Here minorType is LOAD-BEARING, not decorative: because the id keys on marketId
# (the kernel, shared by all three tranches) rather than the vault, it is minorType
# that separates the tranche streams — (marketId, minorType) resolves the vault. The
# `vaultAddress` COLUMN still carries the tranche address for joins; it just is not
# in the id. (This diverges from DayPositionState, which keys on vaultAddress — the
# deliberate choice to group a market's fees under one prefix.)
#
# !! The LIQUIDITY PREMIUM is NOT a fee. It is minted into the market's own
#    accounting, not taken from a holder, so it has NO DayFeeState row. It lives in
#    DayLiquidityPremiumSharesMintedHistory (a RECORDS entity) with its own
#    DayMarketState cursor. Do not route LiquidityPremiumSharesMinted here.
#
# !! majorType does not encode the fee TYPE (it is constant "day"), so a SECOND
#    share-minted fee on the same tranche (none today) would collide on this id — it
#    would need a discriminator added back. Reserved knowledge, not a current concern.
#
# This diverges from royco-rwa, which keys fees by ("protocol"/"liquidityPremium",
# "shares"/"assets") because its FeeState has a single scalar `value` and must fan
# out per denomination. Day's two-column row (`cumulativeShares` + `cumulativeNav`)
# needs neither the type split nor the denomination fan-out.

type DayFeeState @entity(immutable: false) {
  id: String! # <CHAIN_ID>_<MARKET_ID>_<ACCOUNT_ADDRESS>_<MAJOR_TYPE>_<MINOR_TYPE>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  vaultId: String! # Vault ID
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  accountAddress: String! # Account Address
  majorType: String! # Major Type ("day")
  minorType: String! # Minor Type ("senior", "junior", "liquidity") — the tranche, == vault.minorType
  cumulativeShares: BigInt! # Cumulative Shares — running total of every fee event's minted shares.
  cumulativeNav: BigInt! # Cumulative NAV — running total of convertToAssets(newly minted shares).nav across EVERY fee event so far.
  # ^ This mutable current-state row holds the LIFETIME totals ONLY; both fields
  #   grow monotonically. The per-event DELTAS (one fee event's own minted shares,
  #   and its own nav) are NOT kept here — they live on each DayFeeStateHistorical
  #   row as `shares` and `nav`. The two denominations are symmetric:
  #     DayFeeState.cumulativeShares  = SUM(DayFeeStateHistorical.shares)
  #     DayFeeState.cumulativeNav     = SUM(DayFeeStateHistorical.nav)
  #   and each historical row also carries the running sum at that point
  #   (cumulativeShares / cumulativeNav), == this parent row once caught up.
  lastHistoricalEntryIndex: BigInt! # Cursor for DayFeeStateHistorical. See "ENTRY INDEX CURSOR" above.
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
}

type DayFeeStateHistorical @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<MARKET_ID>_<ACCOUNT_ADDRESS>_<MAJOR_TYPE>_<MINOR_TYPE>_<ENTRY_INDEX>
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  vaultId: String! # Vault ID
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  accountAddress: String! # Account Address
  majorType: String! # Major Type ("day")
  minorType: String! # Minor Type ("senior", "junior", "liquidity") — the tranche, == vault.minorType
  entryIndex: BigInt! # Entry Index
  shares: BigInt! # Shares — THIS entry's OWN minted shares (mintedProtocolFeeShares for this single fee event). A per-entry DELTA, NOT a running total.
  cumulativeShares: BigInt! # Cumulative Shares — running total of minted shares across all entries UP TO AND INCLUDING this one. Mirrors DayFeeState.cumulativeShares at this snapshot.
  nav: BigInt! # NAV — THIS entry's OWN contribution: convertToAssets(newly minted shares).nav for this single fee event. A per-entry DELTA, NOT a running total.
  cumulativeNav: BigInt! # Cumulative NAV — running total across all entries UP TO AND INCLUDING this one. Mirrors DayFeeState.cumulativeNav at this snapshot.
  # ^ !! Each denomination has a DELTA and a CUMULATIVE, one word apart and opposite:
  #      shares / nav                    = the addend (this event alone). Not monotonic.
  #      cumulativeShares / cumulativeNav = the running sum (this row + every prior).
  #                      MONOTONIC across a (vault, account, majorType, minorType)
  #                      stream; equals the parent DayFeeState.cumulative* as of this
  #                      entry. So SUM(shares) over entries 0..k == cumulativeShares at
  #                      entry k (same for nav) — never SUM(cumulative*), which
  #                      double-counts.
  #    Handler: snapshot.shares = mintedShares;         (exact, from the event)
  #             snapshot.nav    = convertToAssets(mintedShares).nav;
  #             snapshot.cumulativeShares = feeState.cumulativeShares;  (already advanced)
  #             snapshot.cumulativeNav    = feeState.cumulativeNav;
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

