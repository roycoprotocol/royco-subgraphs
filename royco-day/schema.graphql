# <- ABI: RoycoLiquidityTranche.MultiAssetDeposit(indexed address caller, indexed address receiver, uint256 stAssets, uint256 quoteAssets, uint256 ltAssetsMinted, uint256 shares)
#
# LIQUIDITY-TRANCHE-ONLY event — only RoycoLiquidityTranche declares depositMultiAsset;
# the senior/junior tranches never emit it. One firing == one multi-asset LP deposit.
#
# !! An ACTIVITY table: the id is <CHAIN_ID>_<TX_HASH>_<LOG_INDEX> — one row per event log,
#    like GlobalTokenActivity/GlobalTokenTransfer. No DayMarketState cursor and no
#    entryIndex: the (tx, logIndex) pair is already unique, so nothing needs counting.
#
# !! event.address is the LIQUIDITY TRANCHE, not the kernel (§6). marketId/marketRefId are
#    still populated (for market-scoped joins) by loading this tranche's own DayVaultState
#    and reading its marketId — cheaper than an eth_call to LiquidityTranche.KERNEL().
#
# !! UNITS/DIRECTION: the three asset legs below are the RAW amounts pulled IN from the
#    depositor (asset-token units), NOT tranche-unit claims. Do NOT equate them with the
#    redeem stream's claims* legs, which are settled TRANCHE_UNIT claims paid OUT.
#    Prefer this event over previewDepositMultiAsset — it carries the exact numbers the
#    preview returns, for free, as the post-state at this log index (§5).
type DayMultiAssetDepositActivity @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  vaultAddress: String! # Vault Address (the LIQUIDITY TRANCHE — event.address)
  vaultId: String! # Vault ID
  accountAddress: String! # Account Address <- ABI: MultiAssetDeposit.receiver
  # ^ The SHARE-SIDE party: who the LT shares are minted to. Chosen over `caller` so this
  #   column keeps DayPositionState.accountAddress semantics ("this account's balance of
  #   THIS vault's share token") and joins straight to the LP's LT position.
  callerAddress: String! # Caller Address <- ABI: MultiAssetDeposit.caller
  # ^ msg.sender, the LP initiator whose ST+quote legs are pulled to the kernel
  #   (RoycoLiquidityTranche.sol:60-61,75). MAY be a router/zap distinct from receiver,
  #   and is not recoverable from the Global* token tables (a mid-call contract is not
  #   tx.origin) — this row is the sole on-subgraph record of the initiator.
  seniorTrancheAssets: BigInt! # Senior Tranche Assets <- ABI: stAssets (raw ST_ASSET leg pulled IN; asset-token units)
  quoteAssets: BigInt! # Quote Assets <- ABI: quoteAssets (raw venue QUOTE_ASSET leg pulled IN — the pool's non-senior constituent; NOTE the same column name is paid OUT on redeem)
  liquidityTrancheAssetsMinted: BigInt! # Liquidity Tranche Assets Minted <- ABI: ltAssetsMinted
  shares: BigInt! # Shares <- ABI: shares (LT shares MINTED to receiver)
  # ^ These four are a FLAT amount tuple, NOT an AssetClaims quintuple — no claims* prefix
  #   (contrast DayMultiAssetRedeemActivity, whose stClaims IS one). The ST/quote/LT
  #   underlying ERC20s are unindexed here, so this row is the sole on-subgraph record of
  #   the asset legs; only `shares` also appears in Global* (the LT Transfer mint at a
  #   lower log index). The handler writes ONLY this activity row — it
  #   must NOT re-book supply/position (owned by that Transfer); the two are joinable by
  #   transaction hash but NOT summable. No sharesTotalSupply column: the event
  #   carries no supply arg, and an eth_call totalSupply() would double-count against the
  #   Transfer handler's supply accounting (royco-factory.ts:284-292 trap).
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

# <- ABI: RoycoLiquidityTranche.MultiAssetRedeem(indexed address caller, indexed address receiver, indexed address owner, uint256 shares, (uint256 stAssets, uint256 jtAssets, uint256 ltAssets, uint256 stShares, uint256 nav) stClaims, uint256 quoteAssets)
#
# LIQUIDITY-TRANCHE-ONLY event. NOTE stClaims sits at index 4, AFTER `shares` — unlike
# Redeem, where the claims struct is at index 2 (§6).
#
# !! An ACTIVITY table: the id is <CHAIN_ID>_<TX_HASH>_<LOG_INDEX> — one row per event log,
#    like GlobalTokenActivity. No DayMarketState cursor and no entryIndex.
#
# !! event.address is the LIQUIDITY TRANCHE, not the kernel (§6). marketId/marketRefId are
#    populated (for market-scoped joins) by loading this tranche's own DayVaultState and
#    reading its marketId — cheaper than an eth_call to LiquidityTranche.KERNEL().
#
# !! THREE distinct parties — caller, receiver and owner can all differ:
#      owner    = whose LT shares are BURNED (_burn(owner, shares))      -> accountAddress
#      receiver = who RECEIVES the ST/JT underlying + quote assets        -> receiverAddress
#      caller   = msg.sender; spends owner's LT allowance when != owner   -> callerAddress
type DayMultiAssetRedeemActivity @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID: <KERNEL_ADDRESS>
  marketRefId: String! # Market Reference ID: <CHAIN_ID>_<MARKET_ID>
  vaultAddress: String! # Vault Address (the LIQUIDITY TRANCHE — event.address)
  vaultId: String! # Vault ID
  accountAddress: String! # Account Address <- ABI: MultiAssetRedeem.owner
  # ^ The SHARE-SIDE party: whose LT shares are burned (_burn(owner, shares),
  #   RoycoLiquidityTranche.sol:105). Chosen over receiver/caller so this column keeps
  #   DayPositionState.accountAddress semantics and joins straight to the LP's LT
  #   position. Do NOT naively JOIN to DayMultiAssetDepositActivity.accountAddress: there
  #   it is the mint RECEIVER, here the burn OWNER — both share-side, different role.
  callerAddress: String! # Caller Address <- ABI: MultiAssetRedeem.caller
  # ^ msg.sender. When caller != owner it spends owner's LT allowance
  #   (_spendAllowance(owner, msg.sender, shares), RoycoLiquidityTranche.sol:97-99). MAY
  #   be a router/zap; only on-subgraph record of the initiator.
  receiverAddress: String! # Receiver Address <- ABI: MultiAssetRedeem.receiver
  # ^ Who the withdrawn ST/JT underlying + quoteAssets are PAID TO. Can differ from owner
  #   on a delegated/routed redeem. Those ST_ASSET/JT_ASSET/QUOTE_ASSET ERC20s are
  #   unindexed here, so this event is the ONLY on-subgraph record of the asset recipient.
  shares: BigInt! # Shares <- ABI: shares (LT shares BURNED from owner; always non-zero, require(_shares != 0))
  # ^ The handler writes ONLY this activity row — it must NOT re-book
  #   supply/position (owned by the LT burn Transfer at a lower log index). Joinable to
  #   Global* by transaction hash but NOT summable. No sharesTotalSupply column:
  #   the event carries no supply arg.
  #
  # --- The AssetClaims quintuple carried by stClaims. See the full AssetClaims note on
  #     DayVaultState above for the field mapping and the claims* prefix rationale.
  #
  # !! PROVENANCE DIFFERS from every other claims* quintuple in this schema, and it is
  #    NOT the DayVaultState LT convertToAssets asymmetry (stShares->0, nav->ltRawNAV) —
  #    do NOT copy that note here. stClaims is the kernel's SENIOR-tranche claim:
  #    _deriveTrancheAssetClaims(SENIOR, state), scaled by stSharesToRedeem/totalSTShares,
  #    then the ST self-liquidation bonus (RedemptionLogic.sol:174,189,193). Verified in
  #    contracts/:
  #      - claimsSeniorTrancheShares AND claimsLiquidityTrancheAssets are INVARIANTLY 0.
  #        The SENIOR branch of _deriveTrancheAssetClaims (TrancheClaimsLogic.sol:53-56)
  #        sets ONLY stAssets/jtAssets/nav and never the two LT-only fields; scaling and
  #        the bonus (SelfLiquidationLogic.sol:64-66) preserve the zeros. Same zero VALUE
  #        as an LT row, DIFFERENT cause (a senior claim, not the convertToAssets rewrite).
  #      - claimsNAV is a SENIOR effective-NAV figure, NOT ltRawNAV.
  #    Non-zero legs: claimsSeniorTrancheAssets, claimsJuniorTrancheAssets (may include a
  #    self-liquidation bonus JT leg), claimsNAV. UNITS: these are settled TRANCHE_UNIT
  #    claims paid OUT — do NOT equate with the deposit stream's raw pulled-in asset legs.
  claimsSeniorTrancheAssets: BigInt! # Claims Senior Tranche Assets <- ABI: stClaims.stAssets (ST underlying settled to receiver)
  claimsJuniorTrancheAssets: BigInt! # Claims Junior Tranche Assets <- ABI: stClaims.jtAssets (JT underlying incl. any self-liquidation bonus JT leg)
  claimsLiquidityTrancheAssets: BigInt! # Claims Liquidity Tranche Assets <- ABI: stClaims.ltAssets (INVARIANTLY 0 — LT-only field; a SENIOR claim never sets it)
  claimsSeniorTrancheShares: BigInt! # Claims Senior Tranche Shares <- ABI: stClaims.stShares (INVARIANTLY 0 — LT-only field; a SENIOR claim never sets it; NOT the LT convertToAssets asymmetry)
  claimsNAV: BigInt! # Claims NAV <- ABI: stClaims.nav — the redeemer's PRO-RATA slice of the senior effective NAV (scaled by stSharesToRedeem/totalSTShares) PLUS any ST self-liquidation bonus NAV; NOT ltRawNAV, and NOT the market-level state.stEffectiveNAV
  quoteAssets: BigInt! # Quote Assets <- ABI: quoteAssets (venue QUOTE_ASSET paid OUT to receiver; 0 when userAssetClaims.ltAssets == 0 and venue removal is skipped, RedemptionLogic.sol:181; NOTE the same column name is pulled IN on deposit)
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

