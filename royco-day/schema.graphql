  vaultId: String! # Vault ID
  accountAddress: String! # Account Address <- ABI: LiquidityPremiumSharesMinted.holder
  # ^ INVARIANTLY THE KERNEL, i.e. always == marketId. Never an end user, never an LP:
  #   the caller passes address(this) from inside the kernel, and
  #   RoycoSeniorTranche.mintLiquidityPremiumShares is `onlyKernel` with no other
  #   minter — enforced at the contract level, not merely observed. Kept for shape
  #   symmetry with the other fee/position entities; it is a constant column.
  shares: BigInt! # Shares <- ABI: mintedLiquidityPremiumShares
  sharesTotalSupply: BigInt! # Shares Total Supply <- ABI: totalTrancheShares (the SENIOR tranche total supply POST-mint)
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
}

