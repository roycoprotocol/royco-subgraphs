# =============================================================================
# royco-day schema
#
# Ported from day-draft/day.schema.graphql. Field names are preserved from the
# draft; where a name differs from the ABI member it is read from, the field
# carries a "<- ABI:" annotation so handler authors never have to guess. The
# full mapping table lives in CLAUDE.md §7.
#
# Entity + field names become Postgres table + column names (snake_case) via the
# Goldsky pipeline. A rename here is a column migration in Neon. See CLAUDE.md §9.
# =============================================================================

# === GLOBAL ===
#
# !! FROZEN CROSS-PACKAGE CONTRACT — DO NOT CHANGE THESE TWO ENTITIES !!
#
# GlobalTokenTransfer and GlobalTokenActivity are byte-identical to the same
# entities in royco-rwa/schema.graphql. That is deliberate: royco-rwa (5
# pipelines), royco-usd, and staked-royco-usd ALL sink these entities into the
# SAME shared Neon tables — public.global_token_transfer and
# public.global_token_activity, secret NEON_ROYCO_ESTATE. royco-day joins that
# union.
#
# Rows do not collide (ids are chain + tx + log scoped), but the column set is
# now a contract shared with those packages. Adding, removing, or renaming a
# field here breaks their pipelines, not just ours. Before touching either
# entity, diff against royco-rwa/schema.graphql and coordinate the change across
# every package listed above.

type GlobalTokenTransfer @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>
  vaultId: String! # Vault ID
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  category: String! # Category ("shares", "assets")
  subCategory: String! # Sub Category ("mint", "burn", "transferIn", "transferOut", "deposit", "withdraw")
  tokenId: String! # Token ID
  tokenAddress: String! # Token Address
  fromAddress: String! # From Address
  toAddress: String! # To Address
  value: BigInt! # Value
  blockNumber: BigInt! # Block Number
  blockTimestamp: BigInt! # Block Timestamp
  transactionHash: String! # Transaction Hash
  logIndex: BigInt! # Log Index
  createdAt: BigInt! # Created At
}

type GlobalTokenActivity @entity(immutable: true) {
  id: String! # <CHAIN_ID>_<TRANSACTION_HASH>_<LOG_INDEX>_<VAULT_ADDRESS>_<CATEGORY>_<SUB_CATEGORY>_<TOKEN_INDEX>
  vaultId: String! # Vault ID
  chainId: BigInt! # Chain ID
  vaultAddress: String! # Vault Address
  category: String! # Category ("shares", "assets")
  subCategory: String! # Sub Category ("mint", "burn", "transferIn", "transferOut", "deposit", "withdraw")
  accountAddress: String! # Account Address
  type: String! # Type ("transfer")
  tokenIndex: BigInt! # Token Index
  tokenId: String! # Token ID
  tokenAddress: String! # Token Address
  value: BigInt! # Value
  status: String! # Status ("completed")
  blockNumber: BigInt! # Block Number
  blockTimestamp: BigInt! # Block Timestamp
  transactionHash: String! # Transaction hash
  logIndex: BigInt! # Log Index
  createdAt: BigInt! # Created At
}

# xxx GLOBAL xxx

# === MARKETS ===

type DayMarketState @entity(immutable: false) {
  # ======
  # => data from "event MarketDeploymentCompleted" in "RoycoFactory" (abis/RoycoFactory.json)
  #    Signature (all 8 tuple components, in order):
  #    MarketDeploymentCompleted(indexed address,indexed address,(address,address,address,address,address,address,address,bytes))
  id: String! # <CHAIN_ID>_<MARKET_ID> where "marketId" is "kernelAddress"
  chainId: BigInt! # Chain ID
  marketId: String! # Market ID (is "kernelAddress")
  templateAddress: String! # Template Address
  deployerAddress: String! # Deployer Address
  seniorTrancheAddress: String! # Senior Tranche Address
  juniorTrancheAddress: String! # Junior Tranche Address
  liquidityTrancheAddress: String! # Liquidity Tranche Address
  seniorTrancheId: String! # Senior Tranche ID: <CHAIN_ID>_<SENIOR_TRANCHE_ADDRESS>
  juniorTrancheId: String! # Junior Tranche ID: <CHAIN_ID>_<JUNIOR_TRANCHE_ADDRESS>
  liquidityTrancheId: String! # Liquidity Tranche ID: <CHAIN_ID>_<LIQUIDITY_TRANCHE_ADDRESS>
  kernelAddress: String! # Kernel Address
  accountantAddress: String! # Accountant Address
  juniorTrancheYdmAddress: String! # Junior Tranche YDM Address <- ABI: result.ydm (NOT result.ltYdm)
  liquidityTrancheYdmAddress: String! # Liquidity Tranche YDM Address <- ABI: result.ltYdm
  creationEncodedData: String! # Creation Encoded Data (bytes of "extras" in event, stored as hex string)
  # ======
  # ======
  # => data from "RoycoDayAccountant.getState()" (27-member struct)
  seniorTrancheProtocolFeeWAD: BigInt! # Senior Tranche Protocol Fee WAD <- ABI: stProtocolFeeWAD
  juniorTrancheProtocolFeeWAD: BigInt! # Junior Tranche Protocol Fee WAD <- ABI: jtProtocolFeeWAD
  juniorTrancheYieldShareProtocolFeeWAD: BigInt! # Junior Tranche Yield Share Protocol Fee WAD <- ABI: jtYieldShareProtocolFeeWAD
  liquidityTrancheYieldShareProtocolFeeWAD: BigInt! # Liquidity Tranche Yield Share Protocol Fee WAD <- ABI: ltYieldShareProtocolFeeWAD
  minCoverageWAD: BigInt! # Min Coverage WAD <- ABI: minCoverageWAD
  minLiquidityWAD: BigInt! # Min Liquidity WAD <- ABI: minLiquidityWAD
  marketState: String! # Market State (Enum: "fixed" -> "0" in Contract.MarketState, "perpetual" -> "1" in Contract.MarketState)
  # ^ <- ABI: lastMarketState (uint8 -> i32). NOTE: this is the LAST SYNCED state.
  #   The LIVE state is previewSyncTrancheAccounting().state.marketState. They
  #   disagree between syncs — this field is deliberately the stored one.
  fixedTermDurationSeconds: BigInt! # Fixed Term Duration Seconds <- ABI: fixedTermDurationSeconds (uint24 -> i32! needs BigInt.fromI32)
  fixedTermEndTimestamp: BigInt! # Fixed Term End Timestamp <- ABI: fixedTermEndTimestamp (uint32 -> BigInt, direct)
  lastYieldShareAccruedTimestamp: BigInt! # Last Yield Share Accrued Timestamp <- ABI: lastYieldShareAccrualTimestamp
  lastPremiumPaymentTimestamp: BigInt! # Last Premium Payment Timestamp <- ABI: lastPremiumPaymentTimestamp
  timeWeightedJuniorTrancheYieldShareAccruedWAD: BigInt! # Time Weighted Junior Tranche Yield Share Accrued WAD <- ABI: twJTYieldShareAccruedWAD
  maxJuniorTrancheYieldShareAccruedWAD: BigInt! # Max Junior Tranche Yield Share WAD <- ABI: maxJTYieldShareWAD
  # ^ NOTE: this is a CONFIGURED CAP (set via setMaxYieldShares / MaxYieldSharesUpdated),
  #   NOT an accrual — despite the "Accrued" in the field name. The real accrual is
  #   timeWeightedJuniorTrancheYieldShareAccruedWAD directly above. Do not average them.
  timeWeightedLiquidityTrancheYieldShareAccruedWAD: BigInt! # Time Weighted Liquidity Tranche Yield Share Accrued WAD <- ABI: twLTYieldShareAccruedWAD
  maxLiquidityTrancheYieldShareAccruedWAD: BigInt! # Max Liquidity Tranche Yield Share WAD <- ABI: maxLTYieldShareWAD (also a CAP, see above)
  coverageLiquidationUtilizationWAD: BigInt! # Coverage Liquidation Utilization WAD <- ABI: coverageLiquidationUtilizationWAD
  seniorTrancheDustTolerance: BigInt! # Senior Tranche Dust Tolerance <- ABI: stNAVDustTolerance
  juniorTrancheDustTolerance: BigInt! # Junior Tranche Dust Tolerance <- ABI: jtNAVDustTolerance
  effectiveNAVDustTolerance: BigInt! # Effective NAV Dust Tolerance <- ABI: effectiveNAVDustTolerance
  # ======
  # ======
  # => data from "RoycoDayKernel.getState()" (7-member struct)
  protocolFeeRecipientAddress: String! # Protocol Fee Recipient Address <- ABI: protocolFeeRecipient
  seniorTrancheSelfLiquidationBonusWAD: BigInt! # Senior Tranche Self Liquidation Bonus WAD <- ABI: stSelfLiquidationBonusWAD
  seniorTrancheOwnedYieldBearingAssets: BigInt! # Senior Tranche Owned Yield Bearing Assets in asset token units <- ABI: stOwnedYieldBearingAssets
  juniorTrancheOwnedYieldBearingAssets: BigInt! # Junior Tranche Owned Yield Bearing Assets in asset token units <- ABI: jtOwnedYieldBearingAssets
  liquidityTrancheOwnedYieldBearingAssets: BigInt! # Liquidity Tranche Owned Yield Bearing Assets in asset token units <- ABI: ltOwnedYieldBearingAssets
  liquidityTrancheOwnedSeniorTrancheShares: BigInt! # Liquidity Tranche Owned Senior Tranche Shares <- ABI: ltOwnedSeniorTrancheShares
  # NOTE: Kernel.getState() also returns `roycoBlacklist` (address), which this
  # schema deliberately does not capture. RoycoBlacklistUpdated(address) is
  # likewise unindexed. Add both together if it is ever needed.
  # ======
  # ======
  # => data from "RoycoDayKernel.previewSyncTrancheAccounting(_trancheType)"
  #
  #    !! Use the KERNEL overload, not the Accountant's !!
  #    Kernel:     previewSyncTrancheAccounting(uint8 _trancheType)
  #                  -> (TrancheState state, Claims claims, uint256 totalTrancheShares)   [view]
  #    Accountant: previewSyncTrancheAccounting(uint256 _stRawNAV, uint256 _jtRawNAV)
  #                  -> (TrancheState state)                                              [view]
  #    The Accountant overload requires you to supply the very NAVs you are
  #    trying to read — circular. The Kernel derives them itself, and only the
  #    Kernel returns `claims` (which DayVaultState's five asset fields need).
  #
  #    The fields below all come from `state`, which is TRANCHE-INDEPENDENT — so
  #    any _trancheType works for this market-level entity. DayVaultState, which
  #    consumes `claims`, must pass that tranche's own TRANCHE_TYPE() instead.
  seniorTrancheRawNAV: BigInt! # Senior Tranche Raw NAV <- ABI: state.stRawNAV
  juniorTrancheRawNAV: BigInt! # Junior Tranche Raw NAV <- ABI: state.jtRawNAV
  liquidityTrancheRawNAV: BigInt! # Liquidity Tranche Raw NAV <- ABI: state.ltRawNAV
  seniorTrancheEffectiveNAV: BigInt! # Senior Tranche Effective NAV <- ABI: state.stEffectiveNAV
  juniorTrancheEffectiveNAV: BigInt! # Junior Tranche Effective NAV <- ABI: state.jtEffectiveNAV
  juniorTrancheCoverageImpermanentLoss: BigInt! # Junior Tranche Coverage Impermanent Loss <- ABI: state.jtCoverageImpermanentLoss
  liquidityTrancheLiquidityPremium: BigInt! # Liquidity Tranche Liquidity Premium <- ABI: state.ltLiquidityPremium
  coverageUtilizationWAD: BigInt! # Coverage Utilization WAD <- ABI: state.coverageUtilizationWAD
  liquidityUtilizationWAD: BigInt! # Liquidity Utilization WAD <- ABI: state.liquidityUtilizationWAD
  isJuniorTrancheCoinvested: Boolean! # Is Junior Tranche Coinvested <- ABI: state.jtCoinvested
  # ======
  # ======
  # => general data
  createdAtTransactionHash: String! # Created At Transaction Hash
  createdAtBlockNumber: BigInt! # Created At Block Number
  createdAtBlockTimestamp: BigInt! # Created At Block Timestamp
  updatedAtTransactionHash: String! # Updated At Transaction Hash
  updatedAtBlockNumber: BigInt! # Updated At Block Number
  updatedAtBlockTimestamp: BigInt! # Updated At Block Timestamp
}

